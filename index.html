<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INNOMA.VC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./output.css" />
  </head>
  <body class="min-h-screen bg-slate-950 font-[Montserrat,sans-serif] font-normal text-white [font-optical-sizing:auto]">
    <header class="relative min-h-screen overflow-hidden bg-[url('./photos/bgphone.svg')] bg-cover bg-center bg-no-repeat before:absolute before:inset-0 before:bg-slate-950/55 before:content-[''] sm:bg-[url('./photos/bgtablet.svg')] lg:bg-[url('./photos/bgdesk.svg')]">
      <nav class="relative z-10 mx-auto flex w-full max-w-[1280px] items-center justify-between gap-4 px-4 pt-5 sm:px-6 sm:pt-6 lg:px-10 lg:pt-8">
        <a href="#" class="text-2xl font-extrabold tracking-tight sm:text-3xl">
          INNOMA.<span class="text-sky-400">VC</span>
        </a>
        <ul class="hidden items-center gap-8 text-lg font-medium lg:flex">
          <li><a href="#" class="transition hover:text-cyan-300">Кто мы?</a></li>
          <li><a href="#" class="transition hover:text-cyan-300">Услуги</a></li>
          <li><a href="#" class="transition hover:text-cyan-300">Акселератор</a></li>
          <li><a href="#" class="transition hover:text-cyan-300">Новости</a></li>
        </ul>
        <div class="flex items-center gap-3">
          <button
            type="button"
            aria-label="Открыть меню"
            class="inline-flex h-12 w-12 flex-col items-center justify-center gap-1.5 rounded-2xl border border-white/20 bg-white/10 backdrop-blur transition hover:bg-white/15 lg:hidden"
          >
            <span class="h-0.5 w-5 rounded-full bg-white"></span>
            <span class="h-0.5 w-5 rounded-full bg-white"></span>
            <span class="h-0.5 w-5 rounded-full bg-white"></span>
          </button>
          <a
            href="#"
            class="hidden min-h-12 items-center justify-center rounded-2xl bg-teal-400 px-6 text-base font-semibold text-white transition hover:bg-teal-300 sm:px-8 sm:text-lg lg:inline-flex lg:min-h-14 lg:px-12"
          >
            Войти
          </a>
        </div>
      </nav>
      <section class="relative z-10 mx-auto flex min-h-[calc(100vh-84px)] w-full max-w-[1280px] items-center px-4 pb-16 pt-14 sm:min-h-[calc(100vh-92px)] sm:px-6 sm:pb-20 sm:pt-20 lg:px-10 lg:pb-28 lg:pt-24">
        <div class="max-w-[860px]">
          <div class="space-y-3 sm:space-y-4 lg:space-y-5">
            <p class="text-3xl font-black uppercase leading-none tracking-tight sm:text-5xl lg:text-[52px]">
              Запустите
            </p>
            <div class="inline-flex max-w-full rounded-sm bg-teal-400 px-3 py-2 sm:px-5 sm:py-3">
              <p class="text-2xl font-black uppercase leading-none tracking-tight text-white sm:text-4xl lg:text-[46px]">
                Технологический IT-Бизнес
              </p>
            </div>
            <p class="text-2xl font-black uppercase leading-tight tracking-tight sm:text-4xl lg:text-[46px]">
              На международных рынках
            </p>
          </div>
          <p class="mt-6 max-w-[720px] text-lg font-light text-slate-100 sm:mt-8 sm:text-2xl lg:text-[30px] lg:leading-[1.15]">
            Открыт набор заявок на акселератор
          </p>
          <div class="mt-8 flex flex-wrap gap-4 sm:mt-10">
            <a
              href="#"
              class="inline-flex min-h-14 items-center justify-center rounded-2xl bg-sky-500 px-7 text-base font-semibold text-white shadow-lg shadow-sky-950/40 transition hover:bg-sky-400 sm:min-h-16 sm:px-10 sm:text-xl"
            >
              Подать заявку
            </a>
          </div>
        </div>
      </section>
    </header>
  </body>
</html>
